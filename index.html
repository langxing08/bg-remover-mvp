<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Free online image background remover. Remove backgrounds from images instantly in your browser — no upload required, your privacy is protected." />
    <title>Background Remover — Instant Image Background Removal</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🖼️</text></svg>" />
  </head>
  <body>
    <div id="app">
      <header>
        <h1>Background Remover</h1>
        <p class="subtitle">Remove image backgrounds instantly, right in your browser ✨</p>
        <div id="userArea" class="user-area">
          <button id="loginBtn" class="btn-google" hidden>
            <svg width="18" height="18" viewBox="0 0 24 24"><path fill="currentColor" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"/><path fill="currentColor" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="currentColor" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="currentColor" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
            Sign in with Google
          </button>
          <div id="userInfo" class="user-info" hidden>
            <img id="userAvatar" class="user-avatar" alt="" />
            <span id="userName"></span>
            <button id="logoutBtn" class="btn-logout">Sign out</button>
          </div>
        </div>
      </header>

      <main>
        <!-- Upload Zone -->
        <div id="uploadZone" class="upload-zone">
          <div class="upload-content">
            <svg class="upload-icon" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
              <polyline points="17 8 12 3 7 8" />
              <line x1="12" y1="3" x2="12" y2="15" />
            </svg>
            <p class="upload-text">Drop an image here or <span class="upload-link">click to browse</span></p>
            <p class="upload-hint">Supports JPG, PNG, WEBP</p>
          </div>
          <input id="fileInput" type="file" accept="image/*" hidden />
        </div>

        <!-- Processing Indicator -->
        <div id="processing" class="processing" hidden>
          <div class="spinner"></div>
          <p id="progressText" class="progress-text">Loading model...</p>
          <div class="progress-bar-track">
            <div id="progressBar" class="progress-bar-fill"></div>
          </div>
        </div>

        <!-- Result View -->
        <div id="result" class="result" hidden>
          <div class="result-tabs">
            <button id="tabOriginal" class="tab active">Original</button>
            <button id="tabResult" class="tab">Result</button>
          </div>
          <div class="result-viewport">
            <div id="originalPanel" class="panel active">
              <img id="originalImage" alt="Original" />
            </div>
            <div id="resultPanel" class="panel">
              <img id="resultImage" alt="Processed" />
            </div>
          </div>
          <div class="result-actions">
            <span id="imageInfo" class="image-info"></span>
            <button id="downloadBtn" class="btn btn-primary">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
                <polyline points="7 10 12 15 17 10" />
                <line x1="12" y1="15" x2="12" y2="3" />
              </svg>
              Download PNG
            </button>
            <button id="resetBtn" class="btn btn-secondary">Remove Another</button>
          </div>
        </div>
      </main>

      <footer>
        <p>All processing is done locally in your browser. Your images never leave your device. 🔒</p>
      </footer>
    </div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
